name: DevSecOps CI

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

jobs:
  robot-tests:

    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Démarrage de Flask
        run: |
          python app.py &
          sleep 5

      - name: Exécution des tests Robot Framework
        run: |
          robot tests/api_tests.robot

      - name: Sauvegarde des rapports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-report
          path: |
            report.html
            log.html
            output.xml
            